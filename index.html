<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="theme-color" content="#0f172a">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Reliability Auditor</title>
  <link rel="icon" type="image/png" sizes="1024x1024" href="/icon-1024.png">
  <link rel="apple-touch-icon" href="/icon-1024.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace']
          },
          colors: {
            slate: { 850: '#1e293b' },
            brand: {
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8'
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Scrollbar */
    .scroll-thin::-webkit-scrollbar { width: 8px; height: 8px }
    .scroll-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px }
    .scroll-thin::-webkit-scrollbar-track { background: transparent }

    /* Enter animation */
    .animate-enter { animation: fadeIn 0.3s ease-out forwards }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px) }
      to   { opacity: 1; transform: translateY(0) }
    }

    /* Merged table */
    .merged-table th {
      background-color: #f1f5f9;
      position: sticky;
      top: 0;
      z-index: 10;
      border: 1px solid #cbd5e1;
      padding: 8px;
      font-size: 11px;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
    }
    .merged-table td {
      border: 1px solid #e2e8f0;
      padding: 8px;
      font-size: 12px;
      vertical-align: top;
      background: white;
    }
    .merged-table tr:hover td { background-color: #f8fafc }
  </style>
</head>
<body class="m-0 p-0">
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
